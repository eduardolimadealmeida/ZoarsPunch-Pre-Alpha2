<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>ZoarsPunch FPS Pro</title>

<style>
body { margin: 0; overflow: hidden; background: #000; }

#ui {
    position: fixed;
    top: 10px;
    left: 10px;
    color: white;
    font-family: Arial;
}

#crosshair {
    position: fixed;
    top: 50%;
    left: 50%;
    width: 10px;
    height: 10px;
    border: 2px solid white;
    transform: translate(-50%, -50%);
}

#gun {
    position: fixed;
    bottom: 0;
    right: 60px;
    width: 220px;
    height: 120px;
    background: linear-gradient(45deg, #555, #222);
    border-radius: 20px;
    transform: rotate(-8deg);
}

#hitmarker {
    position: fixed;
    top: 50%;
    left: 50%;
    color: red;
    font-size: 25px;
    transform: translate(-50%, -50%);
    opacity: 0;
}
</style>
</head>

<body>

<div id="ui">
❤️ Vida: <span id="hp">100</span><br>
👾 Inimigos: <span id="enemies">0</span>
</div>

<div id="crosshair"></div>
<div id="gun"></div>
<div id="hitmarker">X</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.152.2/build/three.min.js"></script>

<script>
let scene = new THREE.Scene();
scene.background = new THREE.Color(0x87ceeb);

let camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
let renderer = new THREE.WebGLRenderer({antialias: true});
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

// luz
let light = new THREE.DirectionalLight(0xffffff, 1);
light.position.set(10,20,10);
scene.add(light);

// chão
let floor = new THREE.Mesh(
    new THREE.PlaneGeometry(200,200),
    new THREE.MeshStandardMaterial({color: 0x2e8b57})
);
floor.rotation.x = -Math.PI/2;
scene.add(floor);

// player
camera.position.y = 2;

let yaw = 0;
let pitch = 0;
let targetYaw = 0;
let targetPitch = 0;

let velocity = new THREE.Vector3();
let speed = 0.12;
let friction = 0.85;

let hp = 100;

// inimigos (estilo agentes)
let enemies = [];

function spawnEnemy() {
    let enemy = new THREE.Mesh(
        new THREE.BoxGeometry(1,2,1),
        new THREE.MeshStandardMaterial({color: 0x00aaff})
    );

    enemy.position.set(Math.random()*40-20,1,Math.random()*40-20);
    enemy.hp = 40;

    scene.add(enemy);
    enemies.push(enemy);
}

for(let i=0;i<6;i++) spawnEnemy();

// teclado
let keys = {};
document.addEventListener("keydown", e => keys[e.key]=true);
document.addEventListener("keyup", e => keys[e.key]=false);

// mouse lock
document.body.addEventListener("click", () => {
    document.body.requestPointerLock();
});

// rotação SUAVE (melhorada)
document.addEventListener("mousemove", e => {
    if (document.pointerLockElement === document.body) {
        targetYaw -= e.movementX * 0.002;
        targetPitch -= e.movementY * 0.002;

        targetPitch = Math.max(-Math.PI/2, Math.min(Math.PI/2, targetPitch));
    }
});

// tiro com recoil + spread
document.addEventListener("mousedown", () => {
    let spread = 0.02;

    let x = (Math.random()-0.5) * spread;
    let y = (Math.random()-0.5) * spread;

    let ray = new THREE.Raycaster();
    ray.setFromCamera(new THREE.Vector2(x,y), camera);

    let hits = ray.intersectObjects(enemies);

    // recoil
    targetPitch += 0.03;

    if (hits.length > 0) {
        let enemy = hits[0].object;
        enemy.hp -= 20;

        // hitmarker
        let hit = document.getElementById("hitmarker");
        hit.style.opacity = 1;
        setTimeout(()=>hit.style.opacity=0,100);

        if (enemy.hp <= 0) {
            scene.remove(enemy);
            enemies = enemies.filter(e=>e!==enemy);
            spawnEnemy();
        }
    }
});

// loop
function animate() {
    requestAnimationFrame(animate);

    // suavizar câmera
    yaw += (targetYaw - yaw) * 0.15;
    pitch += (targetPitch - pitch) * 0.15;

    camera.rotation.set(pitch, yaw, 0);

    // movimento suave
    let forward = new THREE.Vector3(Math.sin(yaw),0,Math.cos(yaw));
    let right = new THREE.Vector3(Math.cos(yaw),0,-Math.sin(yaw));

    if(keys["w"]) velocity.add(forward.clone().multiplyScalar(-speed));
    if(keys["s"]) velocity.add(forward.clone().multiplyScalar(speed));
    if(keys["a"]) velocity.add(right.clone().multiplyScalar(-speed));
    if(keys["d"]) velocity.add(right.clone().multiplyScalar(speed));

    velocity.multiplyScalar(friction);
    camera.position.add(velocity);

    // inimigos mais naturais
    enemies.forEach(enemy=>{
        let dir = new THREE.Vector3().subVectors(camera.position, enemy.position);
        let dist = dir.length();

        dir.normalize();
        enemy.position.add(dir.multiplyScalar(0.02));

        if(dist < 1.5){
            hp -= 0.1;
        }
    });

    document.getElementById("hp").innerText = Math.floor(hp);
    document.getElementById("enemies").innerText = enemies.length;

    renderer.render(scene, camera);
}

animate();
</script>

</body>
</html>
