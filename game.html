<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>ZoarsPunch FPS</title>
<style>
body { margin: 0; overflow: hidden; background: black; }
#ui {
    position: fixed;
    top: 10px;
    left: 10px;
    color: white;
    font-family: Arial;
}
</style>
</head>
<body>

<div id="ui">
    Vida: <span id="hp">100</span><br>
    Inimigos: <span id="enemies">0</span>
</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.152.2/build/three.min.js"></script>

<script>
let scene = new THREE.Scene();
let camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
let renderer = new THREE.WebGLRenderer();

renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

// luz
let light = new THREE.PointLight(0xffffff, 1);
light.position.set(10, 10, 10);
scene.add(light);

// chão
let floor = new THREE.Mesh(
    new THREE.PlaneGeometry(100, 100),
    new THREE.MeshBasicMaterial({color: 0x333333})
);
floor.rotation.x = -Math.PI / 2;
scene.add(floor);

// player
camera.position.y = 2;
let velocity = {x:0, z:0};
let speed = 0.1;
let hp = 100;

// inimigos
let enemies = [];

function spawnEnemy() {
    let enemy = new THREE.Mesh(
        new THREE.BoxGeometry(1,2,1),
        new THREE.MeshBasicMaterial({color: 0xff0000})
    );

    enemy.position.set(
        Math.random()*20-10,
        1,
        Math.random()*20-10
    );

    enemy.hp = 30;
    scene.add(enemy);
    enemies.push(enemy);
}

for (let i=0;i<5;i++) spawnEnemy();

// controles
let keys = {};
document.addEventListener("keydown", e => keys[e.key]=true);
document.addEventListener("keyup", e => keys[e.key]=false);

// mouse look
let yaw = 0, pitch = 0;

document.body.addEventListener("click", () => {
    document.body.requestPointerLock();
});

document.addEventListener("mousemove", e => {
    if (document.pointerLockElement === document.body) {
        yaw -= e.movementX * 0.002;
        pitch -= e.movementY * 0.002;

        pitch = Math.max(-Math.PI/2, Math.min(Math.PI/2, pitch));

        camera.rotation.set(pitch, yaw, 0);
    }
});

// tiro
document.addEventListener("mousedown", () => {
    let ray = new THREE.Raycaster();
    ray.setFromCamera(new THREE.Vector2(0,0), camera);

    let hits = ray.intersectObjects(enemies);

    if (hits.length > 0) {
        let enemy = hits[0].object;
        enemy.hp -= 10;

        if (enemy.hp <= 0) {
            scene.remove(enemy);
            enemies = enemies.filter(e => e !== enemy);
        }
    }
});

// loop
function animate() {
    requestAnimationFrame(animate);

    // movimento
    if (keys["w"]) {
        camera.position.x -= Math.sin(yaw)*speed;
        camera.position.z -= Math.cos(yaw)*speed;
    }
    if (keys["s"]) {
        camera.position.x += Math.sin(yaw)*speed;
        camera.position.z += Math.cos(yaw)*speed;
    }
    if (keys["a"]) {
        camera.position.x -= Math.cos(yaw)*speed;
        camera.position.z += Math.sin(yaw)*speed;
    }
    if (keys["d"]) {
        camera.position.x += Math.cos(yaw)*speed;
        camera.position.z -= Math.sin(yaw)*speed;
    }

    // inimigos te seguem
    enemies.forEach(enemy => {
        let dx = camera.position.x - enemy.position.x;
        let dz = camera.position.z - enemy.position.z;

        let dist = Math.sqrt(dx*dx + dz*dz);

        enemy.position.x += dx/dist * 0.02;
        enemy.position.z += dz/dist * 0.02;

        if (dist < 1.5) {
            hp -= 0.1;
        }
    });

    document.getElementById("hp").innerText = Math.floor(hp);
    document.getElementById("enemies").innerText = enemies.length;

    renderer.render(scene, camera);
}

animate();
</script>

</body>
</html>
